# Fly.io config for the backend API.
# Region: sin (Singapore) — bom (Mumbai) is closer to Pakistan but had no
# machine capacity at deploy time; retry a move to bom later if it frees up.
app = "rideshare-pk"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4000"
  # Dev OTP until an SMS aggregator is wired (notifications module).
  # DATABASE_URL / REDIS_URL / JWT secrets are Fly secrets, not env.
  OTP_DEV_MODE = "true"
  CITY_DEFAULT = "lahore"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
